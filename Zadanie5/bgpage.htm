body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #f5f5f5;
}

.combo-background {
    background-image: url('https://bakoomwak.ru/works/2021plus/2.png'); 
    background-color: #333;
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    background-attachment: fixed;
    height: 400px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.title {
    position: relative;
    font-size: 24px;
    margin: 20px 0;
}

.title::before {
    content: "⚡ "; /* Иконка перед заголовком */
    color: gold;
}

.title::after {
    content: " (Новая)"; /* Текст после заголовка */
    color: red;
}

.fixed-background {
    background-image: url('https://bakoomwak.ru/works/2021plus/2.png');
    background-size: cover;
    height: 300px;
    padding: 20px;
}

.size-background {
    background-image: url('https://bakoomwak.ru/works/2021plus/2.png'); 
    background-size: contain;
    height: 300px;
}

.origin-background {
    background-image: url('https://bakoomwak.ru/works/2021plus/2.png'); 
    height: 300px;
    padding: 20px;
}
</style>
</head>
<body>
    <div class="combo-background">Это пример фона с множественными свойствами.</div>
    <h1 class="title">Пример заголовка с псевдоэлементами</h1>
    <div class="fixed-background">Фон с фиксацией при прокрутке.</div>
    <div class="size-background">Фон, который полностью покрывает блок.</div>
    <div class="origin-background">Фон с определением области.</div>
</body>
