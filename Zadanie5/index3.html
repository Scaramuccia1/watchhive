<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Пример сематической страницы</title>
    </head>
    <body>
        <header>
            <h1>Личный блог</h1>
            <nav>
                <ul>
                    <li><a href="#">Главная</a></li>
                    <li><a href="#">О нас</a></li>
                    <li><a href="#">Контакты</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <article>
                <h2>Первая статья</h2>
                <p>Это содержимое нашей первой статьи</p>
            </article>
            <article>
                <h2>Вторая статья</h2>
                <p>Это содержимое нашей второй статьи</p>
            </article>
        </main>
        <aside>
            <h2>Связанные статьи</h2>
            <ul>
                <li><a href="#">Статья 3</a></li>
                <li><a href="#">Статья 4</a></li>
            </ul>
        </aside>
        <footer>
            <p>&copy; 2023 Личный блог. Все права защищены.</p>
        </footer>
    </body>
