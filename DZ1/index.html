<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карусель</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffa339;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .carousel {
            position: relative;
            width: 80%;
            max-width: 600px;
            overflow: hidden;
            border-radius: 10px;
        }
        .carousel-images {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 200%;
        }
        .carousel-image {
            min-width: 100%;
            box-sizing: border-box;
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }        
        input[type="radio"] {
            display: none;
        }
        #slide1:checked ~ .carousel-images {
            transform: translateX(0);
        }
        #slide2:checked ~ .carousel-images {
            transform: translateX(-100%);
        }
        #slide3:checked ~ .carousel-images {
            transform: translateX(-200%);
        }
        .carousel-controls {
            position: absolute;
            top: 95%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }
        .control {
            cursor: pointer;
            background-color: rgb(160, 160, 160);
            border: black;
            border-radius: 60%;
            width: 56px;
            height: 23px;
            margin: 0 20px;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>
    <div class="carousel">
        <input type="radio" name="carousel" id="slide1" checked>
        <input type="radio" name="carousel" id="slide2">
        <input type="radio" name="carousel" id="slide3">
        <div class="carousel-images">
            <div class="carousel-image">
                <img src="https://img.freepik.com/free-photo/mountains-lake_1398-1150.jpg?semt=ais_hybrid&w=740&q=80" alt="Image 1">
            </div>
            <div class="carousel-image">
                <img src="https://moya-planeta.ru/upload/images/l/eb/e2/ebe21cb5a55a808b104f3d51c3ff96284bae5182.jpg" alt="Image 2">
            </div>
            <div class="carousel-image">
                <img src="https://img.goodfon.ru/wallpaper/big/1/e1/priroda-more-krasota.webp" alt="Image 3">
            </div>
        </div>
        <div class="carousel-controls">
            <label for="slide1" class="control"></label>
            <label for="slide2" class="control"></label>
            <label for="slide3" class="control"></label>
        </div>
    </div>
</body>
</html>
