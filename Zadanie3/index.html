<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <meta name="description" content="Это пример страницы с мета-тегами в HTML.">
        <meta name="keywords" content="HTML, CSS, мета-теги, примеры, веб-разработка">
        <meta name="author" content="Ваше имя">
        <meta name="robots" content="index, follow">
        <meta property="og:title" content="Заголовок страницы">
        <meta property="og:description" content="Описание страницы">
        <meta property="og:image" content="URL_изображения">
        <meta property="og:url" content="URL страницы">
        <title>Пример мета-тегов</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Пример использования таблиц на <b>DIV</b>элементах</h1>
        <div class="table">
            <div class="caption">Список сотрудников</div>
            <div class="row header">
                <div class="cell">ID</div>
                <div class="cell">Имя</div>
                <div class="cell">Должность</div>
                <div class="cell">Зарплата</div>
            </div>
            <div class="row">
                <div class="cell">1</div>
                <div class="cell">Иван Иванов</div>
                <div class="cell">Менеджер</div>
                <div class="cell">50, 000 ₽</div>
            </div>
            <div class="row">
                <div class="cell">2</div>
                <div class="cell">Мария Петрова</div>
                <div class="cell">Разработчик</div>
                <div class="cell">60, 000 ₽</div>
            </div>
            <div class="row">
                <div class="cell">3</div>
                <div class="cell">Сергей Сергеев</div>
                <div class="cell">Дизайнер</div>
                <div class="cell">45, 000 ₽</div>
            </div>
            <div class="row footer">
                <div class="cell" colspan="3">Общая зарплата</div>
                <div class="cell">155, 000 ₽</div>
            </div>
        </div>
    </body>
</html>
