<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial="1.0">
        <title>Пример использования iframe</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 20px;
                background-color: #f5f5f5;
            }
            .iframe-container{
                margin-bottom: 30px;
                border: 1px solid #ccc;
                border-radius: 8px;
                overflow: hidden;
            }
            iframe{
                width: 100%;
                height: 400px;
            }
        </style>
    </head>
    <body>
        <h1>Примеры использования<code>iframe</iframe></code></h1>
        <h2>1. Встраивание веб-страницы</h2>
        <div class="iframe-container">
            <iframe src="https://www.wikipedia.org" title="Wikipedia"></iframe>
        </div>
        <h2>2. Встраивание видео</h2>
        <div class="iframe-container">
            <iframe width="720" height="405" src="https://rutube.ru/play/embed/55fe466d757130fb4a34d9f39c589c01/" 
            style="border: none;" allow="clipboard-write; autoplay" webkitAllowFullScreen mozallowfullscreen allowFullScreen></iframe>
        </div>
        <h2>3. Встраивание Google Maps</h2>
        <div class="iframe-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509525!2d144.95373631531634!
            3d-37.81627997975143!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11d69d%3A0x5045675218ceed
            30!2sLonsdale%20Street%2C%20Melbourne%20VIC%2C%20Australia!5e0!3m2!1sen!2sus!4v1609492685919!5m2!1sen!2sus"></iframe>
        </div>
        <h2>4. Встраивание PDF-документа</h2>
        <div class="iframe-container">
            <iframe src="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/pdf/dummy.pdf" title="PDF Document"></iframe>
        </div>
    </body>
</html>
