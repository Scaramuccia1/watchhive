body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
}

h1 {
    color: #4CAF50;
}

.alert {
    background-color: #ffcccc;
    padding: 10px;
    border: 1px solid red;
}

.alert p {
    font-weight: bold;
}

.alert a {
    color: red;
}

ul {
    list-style-type: none;
    padding: 0;
}

ul > li:hover {
    background-color: #e0e0e0; /* Изменение фона элемента списка при наведении */
}

p::first-line {
    font-weight: bold; /* Задаем жирный шрифт первой строки */
}

h2::after {
    content: " - Заметка"; /* Добавляем заметку после заголовка */
}
</style>
</head>
<body>
    <h1>Пример селекторов</h1>
    <div class="alert">
        <p>Имя: <a href="#" target="_blank" title="Ссылка на профиль" alt="профиль">Пользователь</a></p>
    </div>
    <ul>
        <li>Элемент 1</li>
        <li>Элемент 2</li>
        <li>Элемент 3</li>
    </ul>
    <p>Пример текста с <span>вложенным элементом</span>.</p>
    <h2>Заголовок</h2>
    <h2>Пример заголовка с дополнительным текстом</h2>
    <p>Это простой текст для теста.</p>
</body>
