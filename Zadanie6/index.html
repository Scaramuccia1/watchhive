<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Пример селектора CSS</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header id="header">
            <h1>Пример работы с селекторами CSS</h1>
        </header>
        <div class="alert">
            <p>Это уведомление о важной информации!</p>
        </div>
        <div>
            <h2>Список задач</h2>
            <ul>
                <li class="task">Задача 1</li>
                <li class="task">Задача 2</li>
                <li class="task">Задача 3</li>
            </ul>
            <p>Все задачи выполнены.</p>
        </div>
        <div>
            <input type="text" placeholder="Введите текст....">
            <input type="checkbox" id="checkbox">
            <label for="checkbox">Установить задачу как выполненную</label>
        </div>
    </body>
</html>
