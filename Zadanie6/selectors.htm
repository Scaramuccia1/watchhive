/* Селектор по тегу */
h1 {
    color: blue; /* Заголовок будет синего цвета */
}

/* Селектор по классу */
.alert {
    background-color: yellow; /* Фон для уведомления будет жёлтым */
    padding: 15px;
    border: 1px solid orange; /* Оранжевая рамка */
}

/* Селектор по ID */
#header {
    text-align: center; /* Центрируем текст в заголовке */
}

/* Селектор по атрибуту */
input[type="text"] {
    border: 1px solid green; /* Зелёная граница для текстового поля */
    padding: 10px;
    margin-bottom: 10px; /* Отступ снизу для текстового поля */
}

/* Селектор следующего элемента */
h2 + p {
    margin-top: 10px; /* Отступ для абзаца, следующего за h2 */
}

/* Селектор вложенных элементов */
div p {
    color: red; /* Все абзацы внутри любой div будут красного цвета */
}

/* Селектор по классу для задач */
.task {
    font-weight: bold; /* Жирный текст для задач */
    cursor: pointer; /* Указатель при наведении */
}

.task:hover {
    color: purple; /* При наведении цвет текста будет пурпурным */
}
</style>
</head>
<body>
    <header id="header">
        <h1>Пример работы с селекторами CSS</h1>
    </header>
    <div class="alert">
        <p>Это уведомление о важной информации!</p>
    </div>
    <div>
        <h2>Список задач</h2>
        <ul>
            <li class="task">Задача 1</li>
            <li class="task">Задача 2</li>
            <li class="task">Задача 3</li>
        </ul>
        <p>Все задачи выполнены.</p>
    </div>
    <div>
        <input type="text" placeholder="Введите текст...">
        <input type="checkbox" id="checkbox">
        <label for="checkbox">Установить задачу как выполненную</label>
    </div>
</body>
</html>
